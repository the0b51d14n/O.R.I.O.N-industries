# =============================================================================
# ORION INDUSTRIES — docker-compose.yml
# Stack locale complète : PostgreSQL, Redis, API, Web, Admin, Nginx
# =============================================================================
# Usage :
#   docker compose up --build        → lance tout
#   docker compose up --build -d     → lance en arrière-plan
#   docker compose down              → arrête tout
#   docker compose down -v           → arrête tout + supprime les volumes
#   docker compose logs -f           → affiche les logs en temps réel
# =============================================================================

name: orion-industries

# =============================================================================
# SERVICES
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # DATABASE — PostgreSQL
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: orion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-orion_db}
      POSTGRES_USER: ${DB_USER:-orion_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-orion_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - orion_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-orion_user} -d ${DB_NAME:-orion_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # CACHE & QUEUES — Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: orion_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - orion_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # BACKEND — NestJS API
  # ---------------------------------------------------------------------------
  api:
    container_name: orion_api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DB_USER:-orion_user}:${DB_PASSWORD:-orion_password}@postgres:5432/${DB_NAME:-orion_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    networks:
      - orion_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ---------------------------------------------------------------------------
  # FRONTEND — React + Vite (Web)
  # ---------------------------------------------------------------------------
  web:
    container_name: orion_web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3000}
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
    networks:
      - orion_network
    depends_on:
      api:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # ADMIN — Dashboard interne
  # ---------------------------------------------------------------------------
  admin:
    container_name: orion_admin
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_ADMIN_API_URL: ${VITE_ADMIN_API_URL:-http://localhost:3000/api}
      VITE_ADMIN_WS_URL: ${VITE_ADMIN_WS_URL:-ws://localhost:3000}
    ports:
      - "5174:5174"
    volumes:
      - ./apps/admin:/app/apps/admin
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/admin/node_modules
    networks:
      - orion_network
    depends_on:
      api:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # REVERSE PROXY — Nginx
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: orion_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - orion_network
    depends_on:
      - api
      - web
      - admin

# =============================================================================
# VOLUMES — données persistantes
# =============================================================================

volumes:
  postgres_data:
    driver: local
    name: orion_postgres_data

  redis_data:
    driver: local
    name: orion_redis_data

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  orion_network:
    driver: bridge
    name: orion_network